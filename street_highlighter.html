<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Street Segment Builder</title>

  <link rel="stylesheet" href="https://js.arcgis.com/4.29/esri/themes/dark/main.css"/>
  <script src="https://js.arcgis.com/4.29/"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style> #mapView { width: 100%; height: 100%; min-height: 100px; } </style>

  <style>
    :root {
      --bg:       #0f1117;
      --panel:    #181c27;
      --border:   #2a2f3f;
      --accent:   #f5c842;
      --accent2:  #ff6b35;
      --text:     #e8eaf0;
      --muted:    #6b7280;
      --success:  #34d399;
      --error:    #f87171;
      --input-bg: #0f1117;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Barlow Condensed', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .logo-mark {
      width: 30px; height: 30px;
      background: var(--accent);
      clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
      flex-shrink: 0;
    }

    header h1 { font-size: 17px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
    header span { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-left: 4px; }

    .layout { display: flex; flex: 1; overflow: hidden; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 310px; flex-shrink: 0;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    .sidebar-top { overflow-y: auto; flex-shrink: 0; }
    .sidebar-section { padding: 14px 16px; border-bottom: 1px solid var(--border); }
    .section-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 10px;
    }

    .field-group { margin-bottom: 10px; }
    .field-label {
      font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 4px; display: flex; align-items: center; gap: 5px;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); display: inline-block; }
    .dot.orange { background: var(--accent2); }
    .dot.green  { background: var(--success); }

    input[type="text"] {
      width: 100%; background: var(--input-bg);
      border: 1px solid var(--border); border-radius: 4px;
      color: var(--text); font-family: 'DM Mono', monospace;
      font-size: 13px; padding: 7px 10px; outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]::placeholder { color: var(--muted); }
    input[type="text"]:focus { border-color: var(--accent); }

    .autocomplete-wrapper { position: relative; }
    .autocomplete-list {
      position: absolute; top: 100%; left: 0; right: 0;
      background: #1e2230; border: 1px solid var(--border);
      border-top: none; border-radius: 0 0 4px 4px;
      max-height: 150px; overflow-y: auto; z-index: 200; display: none;
    }
    .autocomplete-list.open { display: block; }
    .autocomplete-item {
      padding: 7px 10px; font-family: 'DM Mono', monospace;
      font-size: 12px; cursor: pointer; transition: background 0.1s;
    }
    .autocomplete-item:hover { background: rgba(245,200,66,0.15); color: var(--accent); }

    .btn-row { display: flex; gap: 6px; margin-top: 4px; }

    .btn {
      flex: 1; border: none; border-radius: 4px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; padding: 9px 6px; cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .btn:active { transform: translateY(1px); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    .btn-primary { background: var(--accent); color: #0f1117; }
    .btn-primary:hover:not(:disabled) { background: #ffd84d; }

    .btn-secondary { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-secondary:hover:not(:disabled) { border-color: var(--text); color: var(--text); }

    .btn-add { background: rgba(52,211,153,0.15); color: var(--success); border: 1px solid rgba(52,211,153,0.3); }
    .btn-add:hover:not(:disabled) { background: rgba(52,211,153,0.25); }

    .status-box {
      padding: 10px 16px; font-family: 'DM Mono', monospace;
      font-size: 12px; border-bottom: 1px solid var(--border); min-height: 40px;
    }
    .status-idle    { color: var(--muted); }
    .status-loading { color: var(--accent); }
    .status-success { color: var(--success); }
    .status-error   { color: var(--error); }

    /* ── COLLECTION LIST ── */
    .collection-header {
      padding: 10px 16px 6px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }

    .collection-count {
      font-family: 'DM Mono', monospace; font-size: 11px;
      background: var(--accent); color: #0f1117;
      padding: 2px 7px; border-radius: 10px; font-weight: 500;
    }

    .collection-list {
      flex: 1; overflow-y: auto; padding: 8px 0;
    }

    .collection-item {
      padding: 8px 16px; border-bottom: 1px solid rgba(42,47,63,0.5);
      display: flex; align-items: flex-start; gap: 8px;
      animation: fadeIn 0.2s ease;
      transition: background 0.1s;
    }
    .collection-item:hover { background: rgba(245,200,66,0.04); }

    @keyframes fadeIn { from { opacity:0; transform: translateX(-6px); } to { opacity:1; transform: none; } }

    .item-color-dot {
      width: 10px; height: 10px; border-radius: 50%;
      flex-shrink: 0; margin-top: 3px;
    }

    .item-info { flex: 1; min-width: 0; }
    .item-street {
      font-family: 'DM Mono', monospace; font-size: 12px;
      color: var(--accent); white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    .item-cross {
      font-size: 11px; color: var(--muted); margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .item-seg-count {
      font-family: 'DM Mono', monospace; font-size: 10px;
      color: var(--muted); white-space: nowrap;
    }

    .btn-remove {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 16px; padding: 0 2px;
      line-height: 1; transition: color 0.1s; flex-shrink: 0;
    }
    .btn-remove:hover { color: var(--error); }

    .empty-state {
      padding: 24px 16px; text-align: center;
      color: var(--muted); font-size: 12px; font-family: 'DM Mono', monospace;
      line-height: 1.8;
    }

    /* ── EXPORT FOOTER ── */
    .export-footer {
      padding: 12px 16px; border-top: 1px solid var(--border);
      flex-shrink: 0; background: var(--panel);
    }

    .export-footer .btn-export {
      width: 100%; background: var(--accent2); color: #fff;
      border: none; border-radius: 4px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 11px; cursor: pointer;
      transition: background 0.15s;
    }
    .export-footer .btn-export:hover:not(:disabled) { background: #ff835a; }
    .export-footer .btn-export:disabled { opacity: 0.35; cursor: not-allowed; }

    .export-footer .export-meta {
      font-family: 'DM Mono', monospace; font-size: 10px;
      color: var(--muted); text-align: center; margin-top: 6px;
    }

    #mapView { flex: 1; background: #0a0d14; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<header>
  <div class="logo-mark"></div>
  <div>
    <h1>Segment Builder <span>// Lynwood, CA</span></h1>
  </div>
</header>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-top">

      <!-- CONNECT -->
      <div class="sidebar-section">
        <div class="section-label">⚙ Layer Connection</div>
        <div class="field-group">
          <div class="field-label">Feature Layer URL</div>
          <input type="text" id="layerUrl" placeholder="https://services.arcgis.com/.../FeatureServer/0"/>
        </div>
        <button class="btn btn-primary" onclick="connectLayer()" id="btnConnect">Connect Layer</button>
      </div>

      <!-- SEARCH -->
      <div class="sidebar-section">
        <div class="section-label">🔍 Find Segment</div>

        <div class="field-group">
          <div class="field-label"><span class="dot"></span> Street Name</div>
          <div class="autocomplete-wrapper">
            <input type="text" id="streetInput" placeholder="e.g. Mulford Ave"
              oninput="onAutocomplete('streetInput','streetList',streetNames)" autocomplete="off"/>
            <div class="autocomplete-list" id="streetList"></div>
          </div>
        </div>

        <div class="field-group">
          <div class="field-label"><span class="dot orange"></span> From Cross Street</div>
          <div class="autocomplete-wrapper">
            <input type="text" id="fromInput" placeholder="e.g. California Ave"
              oninput="onAutocomplete('fromInput','fromList',allCrossStreets)" autocomplete="off"/>
            <div class="autocomplete-list" id="fromList"></div>
          </div>
        </div>

        <div class="field-group">
          <div class="field-label"><span class="dot green"></span> To Cross Street</div>
          <div class="autocomplete-wrapper">
            <input type="text" id="toInput" placeholder="e.g. Birch St"
              oninput="onAutocomplete('toInput','toList',allCrossStreets)" autocomplete="off"/>
            <div class="autocomplete-list" id="toList"></div>
          </div>
        </div>

        <div class="btn-row">
          <button class="btn btn-primary" onclick="previewSegment()" id="btnPreview" disabled>Preview</button>
          <button class="btn btn-add"     onclick="addToCollection()" id="btnAdd" disabled>+ Add to List</button>
          <button class="btn btn-secondary" onclick="clearSearch()">Clear</button>
        </div>
      </div>

      <!-- STATUS -->
      <div class="status-box">
        <div id="statusMsg" class="status-idle">○ Connect a layer to begin</div>
      </div>

    </div>

    <!-- COLLECTION -->
    <div class="collection-header">
      <div class="section-label" style="margin-bottom:0">Segment Collection</div>
      <div class="collection-count" id="collectionCount">0</div>
    </div>

    <div class="collection-list" id="collectionList">
      <div class="empty-state">No segments added yet.<br>Search and preview a segment,<br>then click "+ Add to List".</div>
    </div>

    <!-- EXPORT -->
    <div class="export-footer">
      <button class="btn-export" onclick="exportGeoJSON()" id="btnExport" disabled>
        ⬇ Export as GeoJSON
      </button>
      <div class="export-meta" id="exportMeta">Add segments to enable export</div>
    </div>

  </div>

  <div id="mapView"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
require([
  "esri/Map",
  "esri/views/MapView",
  "esri/layers/FeatureLayer",
  "esri/renderers/SimpleRenderer",
  "esri/symbols/SimpleLineSymbol",
  "esri/Graphic",
  "esri/layers/GraphicsLayer"
], function(Map, MapView, FeatureLayer, SimpleRenderer, SimpleLineSymbol, Graphic, GraphicsLayer) {

  // ─── STATE ───────────────────────────────────────────
  let featureLayer   = null;
  let previewLayer   = null;        // yellow — current preview
  let collectionGraphicsLayer = null; // persisted collected segments
  let streetNames    = [];
  let allCrossStreets = [];
  let lastPreviewData = null;       // { features, street, from, to, minAddr, maxAddr }
  let collection     = [];          // [{ id, street, from, to, minAddr, maxAddr, features, color }]
  let collectionIdCounter = 0;

  // Distinct colors for each collected entry
  const COLORS = [
    [245,200,66],   // yellow
    [255,107,53],   // orange
    [52,211,153],   // green
    [99,179,237],   // blue
    [216,180,254],  // purple
    [251,146,60],   // amber
    [167,243,208],  // mint
    [253,186,116],  // peach
  ];

  // ─── MAP SETUP ───────────────────────────────────────
  const map = new Map({ basemap: "dark-gray-vector" });

  const view = new MapView({
    container: "mapView",
    map: map,
    center: [-118.2114, 33.9303],
    zoom: 14,
    ui: { components: [] }   // avoid Calcite injection errors in iframe/GitHub Pages
  });

  // Track view readiness — all goTo calls must go through safeGoTo
  let viewReady = false;
  view.when(() => { viewReady = true; });

  function safeGoTo(target, options) {
    if (viewReady) {
      view.goTo(target, options).catch(() => {});
    } else {
      view.when(() => view.goTo(target, options).catch(() => {}));
    }
  }

  // Graphics layer for collected segments (persistent)
  collectionGraphicsLayer = new GraphicsLayer();
  map.add(collectionGraphicsLayer);

  // Graphics layer for preview (temporary)
  previewLayer = new GraphicsLayer();
  map.add(previewLayer);

  // ─── CONNECT LAYER ───────────────────────────────────
  window.connectLayer = async function() {
    const url = document.getElementById("layerUrl").value.trim();
    if (!url) { setStatus("error", "Enter a Feature Layer URL"); return; }

    setStatus("loading", "Connecting...");
    document.getElementById("btnConnect").disabled = true;

    try {
      if (featureLayer) map.remove(featureLayer);

      featureLayer = new FeatureLayer({
        url,
        renderer: new SimpleRenderer({
          symbol: new SimpleLineSymbol({ color: [80,90,110,0.5], width: 1 })
        }),
        outFields: ["FullName","FROM_CROSS","TO_CROSS","From_L","To_L","OBJECTID"]
      });

      map.add(featureLayer, 0); // add beneath graphics layers
      await featureLayer.load();

      const ext = await featureLayer.queryExtent();
      if (ext?.extent) safeGoTo(ext.extent.expand(1.1));

      await loadStreetNames();

      document.getElementById("btnPreview").disabled = false;
      document.getElementById("btnConnect").disabled = false;
      setStatus("success", "✓ Layer connected — start searching");

    } catch(e) {
      setStatus("error", "Connection failed — check URL");
      document.getElementById("btnConnect").disabled = false;
    }
  };

  async function loadStreetNames() {
    setStatus("loading", "Loading street names...");
    const query = featureLayer.createQuery();
    query.where = "FullName IS NOT NULL";
    query.outFields = ["FullName","FROM_CROSS","TO_CROSS"];
    query.num = 10000;

    const result = await featureLayer.queryFeatures(query);
    const nameSet = new Set(), crossSet = new Set();

    result.features.forEach(f => {
      if (f.attributes.FullName)   nameSet.add(f.attributes.FullName.trim());
      if (f.attributes.FROM_CROSS) f.attributes.FROM_CROSS.split(",").forEach(s => crossSet.add(s.trim()));
      if (f.attributes.TO_CROSS)   f.attributes.TO_CROSS.split(",").forEach(s => crossSet.add(s.trim()));
    });

    window.streetNames     = [...nameSet].sort();
    window.allCrossStreets = [...crossSet].sort();
    setStatus("success", `✓ Ready — ${window.streetNames.length} streets loaded`);
  }

  // ─── PREVIEW ─────────────────────────────────────────
  window.previewSegment = async function() {
    const street = val("streetInput");
    const from   = val("fromInput");
    const to     = val("toInput");

    if (!street)        { setStatus("error", "Enter a street name"); return; }
    if (!from && !to)   { setStatus("error", "Enter at least one cross street"); return; }
    if (!featureLayer)  { setStatus("error", "Connect a layer first"); return; }

    setStatus("loading", "Querying...");
    previewLayer.removeAll();
    lastPreviewData = null;
    document.getElementById("btnAdd").disabled = true;

    try {
      const { features, minAddr, maxAddr } = await querySegments(street, from, to);

      if (features.length === 0) {
        setStatus("error", `No segments found — check spelling`);
        return;
      }

      // Draw preview in yellow
      features.forEach(f => {
        previewLayer.add(new Graphic({
          geometry: f.geometry,
          symbol: new SimpleLineSymbol({ color: [245,200,66,1], width: 5 })
        }));
      });

      // Zoom to preview
      const extent = features.reduce((e, f) => e ? e.union(f.geometry.extent) : f.geometry.extent, null);
      if (extent) safeGoTo(extent.expand(2.5));

      lastPreviewData = { features, street, from, to, minAddr, maxAddr };
      document.getElementById("btnAdd").disabled = false;
      setStatus("success", `✓ Preview: ${features.length} segment${features.length > 1 ? "s" : ""} — click "+ Add to List" to keep`);

    } catch(e) {
      setStatus("error", "Query failed");
      console.error(e);
    }
  };

  // ─── ADD TO COLLECTION ───────────────────────────────
  window.addToCollection = function() {
    if (!lastPreviewData) return;

    const { features, street, from, to, minAddr, maxAddr } = lastPreviewData;
    const id    = ++collectionIdCounter;
    const color = COLORS[(id - 1) % COLORS.length];

    // Draw on persistent collection layer with unique color
    features.forEach(f => {
      collectionGraphicsLayer.add(new Graphic({
        geometry: f.geometry,
        symbol: new SimpleLineSymbol({ color: [...color, 1], width: 5 }),
        attributes: { collectionId: id }
      }));
    });

    // Clear preview
    previewLayer.removeAll();
    lastPreviewData = null;
    document.getElementById("btnAdd").disabled = true;

    // Store in collection array
    collection.push({ id, street, from, to, minAddr, maxAddr, features, color });
    renderCollectionList();

    setStatus("success", `✓ Added — ${collection.length} segment${collection.length > 1 ? "s" : ""} in collection`);

    // Reset inputs for next search
    document.getElementById("streetInput").value = "";
    document.getElementById("fromInput").value = "";
    document.getElementById("toInput").value = "";
  };

  // ─── REMOVE FROM COLLECTION ──────────────────────────
  window.removeFromCollection = function(id) {
    collection = collection.filter(c => c.id !== id);

    // Redraw collection graphics layer
    collectionGraphicsLayer.removeAll();
    collection.forEach(entry => {
      entry.features.forEach(f => {
        collectionGraphicsLayer.add(new Graphic({
          geometry: f.geometry,
          symbol: new SimpleLineSymbol({ color: [...entry.color, 1], width: 5 })
        }));
      });
    });

    renderCollectionList();
    setStatus("idle", `Removed — ${collection.length} segment${collection.length !== 1 ? "s" : ""} remaining`);
  };

  function renderCollectionList() {
    const container = document.getElementById("collectionList");
    const count     = document.getElementById("collectionCount");
    const exportBtn = document.getElementById("btnExport");
    const exportMeta = document.getElementById("exportMeta");

    count.textContent = collection.length;
    exportBtn.disabled = collection.length === 0;

    if (collection.length === 0) {
      container.innerHTML = `<div class="empty-state">No segments added yet.<br>Search and preview a segment,<br>then click "+ Add to List".</div>`;
      exportMeta.textContent = "Add segments to enable export";
      return;
    }

    const totalSegs = collection.reduce((n, c) => n + c.features.length, 0);
    exportMeta.textContent = `${collection.length} entries · ${totalSegs} total segments`;

    container.innerHTML = collection.map(entry => {
      const [r,g,b] = entry.color;
      return `
        <div class="collection-item">
          <div class="item-color-dot" style="background:rgb(${r},${g},${b})"></div>
          <div class="item-info">
            <div class="item-street">${entry.street}</div>
            <div class="item-cross">
              ${entry.from || "—"} → ${entry.to || "—"}
            </div>
          </div>
          <div class="item-seg-count">${entry.features.length} seg${entry.features.length > 1 ? "s" : ""}</div>
          <button class="btn-remove" onclick="removeFromCollection(${entry.id})" title="Remove">×</button>
        </div>
      `;
    }).join("");
  }

  // ─── EXPORT GEOJSON ──────────────────────────────────
  window.exportGeoJSON = function() {
    if (collection.length === 0) return;

    const allFeatures = [];

    collection.forEach(entry => {
      entry.features.forEach(f => {

        // ── Geometry: safely flatten all paths into one LineString ──
        let coords = [];
        try {
          const paths = f.geometry.paths;
          if (Array.isArray(paths) && paths.length > 0) {
            // Concatenate all paths — handles multi-path geometries
            paths.forEach(path => {
              path.forEach(pt => {
                // pt is [x, y] or [x, y, z] — keep only [lon, lat]
                if (Array.isArray(pt) && pt.length >= 2) {
                  coords.push([pt[0], pt[1]]);
                }
              });
            });
          }
        } catch(e) {
          console.warn("Skipping feature with bad geometry", e);
          return; // skip this feature
        }

        if (coords.length < 2) return; // skip degenerate lines

        // ── Properties: strip nulls and internal ArcGIS fields ──
        const rawAttrs = f.attributes || {};
        const cleanProps = {};
        Object.entries(rawAttrs).forEach(([k, v]) => {
          // Skip internal ArcGIS fields and nulls
          if (v === null || v === undefined) return;
          if (k === "Shape__Length" || k === "Shape.STLength()") return;
          cleanProps[k] = v;
        });

        // Add collection metadata
        cleanProps.StreetName  = entry.street;
        cleanProps.FromCross   = entry.from  || "";
        cleanProps.ToCross     = entry.to    || "";
        cleanProps.AddrFrom    = entry.minAddr;
        cleanProps.AddrTo      = entry.maxAddr;

        allFeatures.push({
          type: "Feature",
          properties: cleanProps,
          geometry: {
            type: "LineString",
            coordinates: coords
          }
        });
      });
    });

    // ── Build valid GeoJSON with explicit CRS for ArcGIS Online ──
    const geojson = {
      type: "FeatureCollection",
      crs: {
        type: "name",
        properties: { name: "urn:ogc:def:crs:OGC:1.3:CRS84" }
      },
      features: allFeatures
    };

    const blob = new Blob([JSON.stringify(geojson, null, 2)], { type: "application/json" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href     = url;
    a.download = "lynwood_highlighted_segments.geojson";
    a.click();
    URL.revokeObjectURL(url);

    setStatus("success", `✓ Exported ${allFeatures.length} segments as GeoJSON`);
  };

  // ─── CLEAR SEARCH ────────────────────────────────────
  window.clearSearch = function() {
    previewLayer.removeAll();
    lastPreviewData = null;
    document.getElementById("streetInput").value = "";
    document.getElementById("fromInput").value = "";
    document.getElementById("toInput").value = "";
    document.getElementById("btnAdd").disabled = true;
    setStatus("idle", "○ Cleared");
  };

  // ─── QUERY HELPER ────────────────────────────────────
  async function querySegments(street, from, to) {
    // Step 1 — find boundary segments
    const crossParts = [];
    if (from) {
      crossParts.push(`FROM_CROSS LIKE '%${esc(from)}%'`);
      crossParts.push(`TO_CROSS LIKE '%${esc(from)}%'`);
    }
    if (to) {
      crossParts.push(`FROM_CROSS LIKE '%${esc(to)}%'`);
      crossParts.push(`TO_CROSS LIKE '%${esc(to)}%'`);
    }
    const boundaryWhere = `FullName = '${esc(street)}' AND (${crossParts.join(" OR ")})`;

    const bq = featureLayer.createQuery();
    bq.where = boundaryWhere;
    bq.outFields = ["From_L","To_L","OBJECTID"];
    bq.returnGeometry = false;

    const bResult = await featureLayer.queryFeatures(bq);
    if (bResult.features.length === 0) return { features: [], minAddr: null, maxAddr: null };

    const fromVals = bResult.features.map(f => f.attributes.From_L).filter(v => v != null);
    const toVals   = bResult.features.map(f => f.attributes.To_L).filter(v => v != null);
    const minAddr  = Math.min(...fromVals);
    const maxAddr  = Math.max(...toVals);

    // Step 2 — get all segments in range
    const rq = featureLayer.createQuery();
    rq.where = `FullName = '${esc(street)}' AND From_L >= ${minAddr} AND To_L <= ${maxAddr}`;
    rq.outFields = ["FullName","FROM_CROSS","TO_CROSS","From_L","To_L","OBJECTID"];
    rq.returnGeometry = true;

    const rResult = await featureLayer.queryFeatures(rq);
    return { features: rResult.features, minAddr, maxAddr };
  }

  function esc(s) { return s.replace(/'/g, "''"); }
  function val(id) { return document.getElementById(id).value.trim(); }

  // ─── AUTOCOMPLETE ────────────────────────────────────
  window.onAutocomplete = function(inputId, listId, items) {
    const v = document.getElementById(inputId).value.toLowerCase();
    const list = document.getElementById(listId);
    if (!v || v.length < 2) { list.classList.remove("open"); return; }

    const matches = items.filter(i => i.toLowerCase().includes(v)).slice(0, 8);
    if (!matches.length) { list.classList.remove("open"); return; }

    list.innerHTML = matches.map(m =>
      `<div class="autocomplete-item" onclick="pickItem('${inputId}','${listId}','${m.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">
        ${m}
       </div>`
    ).join("");
    list.classList.add("open");
  };

  window.pickItem = function(inputId, listId, value) {
    document.getElementById(inputId).value = value;
    document.getElementById(listId).classList.remove("open");
  };

  document.addEventListener("click", e => {
    ["streetList","fromList","toList"].forEach(id => {
      const el = document.getElementById(id);
      if (el && !el.parentElement.contains(e.target)) el.classList.remove("open");
    });
  });

  // ─── STATUS ──────────────────────────────────────────
  function setStatus(type, msg) {
    const el = document.getElementById("statusMsg");
    el.className = `status-${type}`;
    el.textContent = msg;
  }

});
}); // DOMContentLoaded
</script>
