<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Street Segment Builder — Lynwood</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg:       #0f1117;
      --panel:    #181c27;
      --border:   #2a2f3f;
      --accent:   #f5c842;
      --accent2:  #ff6b35;
      --text:     #e8eaf0;
      --muted:    #6b7280;
      --success:  #34d399;
      --error:    #f87171;
      --input-bg: #0f1117;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Barlow Condensed', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    body { display: flex; flex-direction: column; }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      display: flex; align-items: center; gap: 12px;
      flex-shrink: 0; z-index: 1000;
    }
    .logo-mark {
      width: 28px; height: 28px; background: var(--accent); flex-shrink: 0;
      clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
    }
    header h1 { font-size: 16px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
    header span { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }

    .layout { display: flex; flex: 1; overflow: hidden; min-height: 0; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 300px; flex-shrink: 0;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .sidebar-scroll { overflow-y: auto; flex-shrink: 0; max-height: 55vh; }
    .sidebar-section { padding: 12px 14px; border-bottom: 1px solid var(--border); }
    .section-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
    }
    .field-group { margin-bottom: 8px; }
    .field-label {
      font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 3px; display: flex; align-items: center; gap: 4px;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); display: inline-block; }
    .dot.o { background: var(--accent2); }
    .dot.g { background: var(--success); }

    input[type="text"] {
      width: 100%; background: var(--input-bg);
      border: 1px solid var(--border); border-radius: 4px;
      color: var(--text); font-family: 'DM Mono', monospace;
      font-size: 12px; padding: 6px 9px; outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]::placeholder { color: var(--muted); }
    input[type="text"]:focus { border-color: var(--accent); }

    .ac-wrap { position: relative; }
    .ac-list {
      position: absolute; top: 100%; left: 0; right: 0;
      background: #1e2230; border: 1px solid var(--border);
      border-top: none; border-radius: 0 0 4px 4px;
      max-height: 130px; overflow-y: auto; z-index: 9999; display: none;
    }
    .ac-list.open { display: block; }
    .ac-item {
      padding: 6px 9px; font-family: 'DM Mono', monospace;
      font-size: 11px; cursor: pointer;
    }
    .ac-item:hover { background: rgba(245,200,66,0.15); color: var(--accent); }

    .btn-row { display: flex; gap: 5px; margin-top: 4px; }
    .btn {
      flex: 1; border: none; border-radius: 4px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; padding: 8px 4px; cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-y  { background: var(--accent);  color: #0f1117; }
    .btn-g  { background: rgba(52,211,153,0.2); color: var(--success); border: 1px solid rgba(52,211,153,0.4); }
    .btn-s  { background: transparent; color: var(--muted); border: 1px solid var(--border); }

    .status-box {
      padding: 8px 14px; font-family: 'DM Mono', monospace;
      font-size: 11px; border-bottom: 1px solid var(--border); min-height: 36px;
    }
    .s-idle    { color: var(--muted); }
    .s-loading { color: var(--accent); }
    .s-ok      { color: var(--success); }
    .s-err     { color: var(--error); }

    /* ── COLLECTION ── */
    .col-header {
      padding: 8px 14px 6px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .col-badge {
      font-family: 'DM Mono', monospace; font-size: 10px;
      background: var(--accent); color: #0f1117;
      padding: 1px 6px; border-radius: 8px;
    }
    .col-list { flex: 1; overflow-y: auto; }
    .col-item {
      padding: 7px 14px; border-bottom: 1px solid rgba(42,47,63,0.5);
      display: flex; align-items: flex-start; gap: 7px;
    }
    .ci-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
    .ci-info { flex: 1; min-width: 0; }
    .ci-street {
      font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .ci-cross { font-size: 10px; color: var(--muted); margin-top: 1px; }
    .ci-segs  { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); white-space: nowrap; }
    .btn-rm   { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 15px; padding: 0; }
    .btn-rm:hover { color: var(--error); }
    .empty { padding: 20px 14px; text-align: center; color: var(--muted); font-size: 11px; font-family: 'DM Mono', monospace; line-height: 1.8; }

    /* ── EXPORT ── */
    .export-footer { padding: 10px 14px; border-top: 1px solid var(--border); flex-shrink: 0; }
    .btn-export {
      width: 100%; background: var(--accent2); color: #fff; border: none; border-radius: 4px;
      font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase; padding: 10px; cursor: pointer;
    }
    .btn-export:hover:not(:disabled) { opacity: 0.85; }
    .btn-export:disabled { opacity: 0.35; cursor: not-allowed; }
    .export-meta { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); text-align: center; margin-top: 5px; }

    /* ── MAP ── */
    #map { flex: 1; min-width: 0; }
    .leaflet-container { background: #1a1d26 !important; }
  </style>
</head>
<body>

<header>
  <div class="logo-mark"></div>
  <h1>Ilich's Cool Segment Builder <span>// Lynwood, CA</span></h1>
</header>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-scroll">

      <!-- CONNECT -->
      <div class="sidebar-section">
        <div class="section-label">⚙ ArcGIS Feature Layer</div>
        <div class="field-group">
          <div class="field-label">REST Endpoint URL</div>
          <input type="text" id="layerUrl" placeholder="https://services.arcgis.com/.../FeatureServer/0"/>
        </div>
        <button class="btn btn-y" onclick="connectLayer()" id="btnConnect">Connect Layer</button>
      </div>

      <!-- SEARCH -->
      <div class="sidebar-section">
        <div class="section-label">🔍 Find Segment</div>

        <div class="field-group">
          <div class="field-label"><span class="dot"></span> Street Name</div>
          <div class="ac-wrap">
            <input type="text" id="streetInput" placeholder="e.g. Mulford Ave" oninput="doAC(this,'streetAC',streetNames)" autocomplete="off"/>
            <div class="ac-list" id="streetAC"></div>
          </div>
        </div>

        <div class="field-group">
          <div class="field-label"><span class="dot o"></span> From Cross Street</div>
          <div class="ac-wrap">
            <input type="text" id="fromInput" placeholder="e.g. California Ave" oninput="doAC(this,'fromAC',crossNames)" autocomplete="off"/>
            <div class="ac-list" id="fromAC"></div>
          </div>
        </div>

        <div class="field-group">
          <div class="field-label"><span class="dot g"></span> To Cross Street</div>
          <div class="ac-wrap">
            <input type="text" id="toInput" placeholder="e.g. Birch St" oninput="doAC(this,'toAC',crossNames)" autocomplete="off"/>
            <div class="ac-list" id="toAC"></div>
          </div>
        </div>

        <div class="btn-row">
          <button class="btn btn-y"  onclick="previewSegment()" id="btnPreview" disabled>Preview</button>
          <button class="btn btn-g"  onclick="addToCollection()" id="btnAdd" disabled>+ Add</button>
          <button class="btn btn-s"  onclick="clearSearch()">Clear</button>
        </div>
      </div>

      <!-- STATUS -->
      <div class="status-box"><div id="statusMsg" class="s-idle">○ Connect a layer to begin</div></div>
    </div>

    <!-- COLLECTION -->
    <div class="col-header">
      <div class="section-label" style="margin:0">Segment Collection</div>
      <div class="col-badge" id="colCount">0</div>
    </div>
    <div class="col-list" id="colList">
      <div class="empty">No segments yet.<br>Preview then click + Add.</div>
    </div>

    <!-- EXPORT -->
    <div class="export-footer">
      <button class="btn-export" onclick="exportGeoJSON()" id="btnExport" disabled>⬇ Export GeoJSON</button>
      <div class="export-meta" id="exportMeta">Add segments to export</div>
    </div>
  </div>

  <!-- MAP -->
  <div id="map"></div>
</div>

<script>
// ─── GLOBALS ─────────────────────────────────────────────────────
let map, previewGroup, collectionGroup;
let layerUrl = "";
let streetNames = [], crossNames = [];
let lastPreview = null;
let collection  = [];
let colIdSeq    = 0;

const COLORS = [
  "#f5c842","#ff6b35","#34d399","#63b3ed",
  "#d8b4fe","#fb923c","#a7f3d0","#fde68a"
];

// ─── MAP INIT ────────────────────────────────────────────────────
window.addEventListener("load", function() {
  map = L.map("map", { zoomControl: true }).setView([33.9303, -118.2114], 14);

  L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
    attribution: '© OpenStreetMap © CARTO',
    maxZoom: 19
  }).addTo(map);

  previewGroup    = L.layerGroup().addTo(map);
  collectionGroup = L.layerGroup().addTo(map);
});

// ─── CONNECT LAYER ───────────────────────────────────────────────
async function connectLayer() {
  layerUrl = document.getElementById("layerUrl").value.trim().replace(/\/+$/, "");
  if (!layerUrl) { setStatus("err","Enter a Feature Layer URL"); return; }

  setStatus("loading","Connecting...");
  document.getElementById("btnConnect").disabled = true;

  try {
    const info = await fetchJSON(`${layerUrl}?f=json`);
    if (!info || info.error) throw new Error(info?.error?.message || "Bad response");

    setStatus("loading","Loading street names...");
    await loadStreetNames();

    document.getElementById("btnPreview").disabled = false;
    document.getElementById("btnConnect").disabled = false;
    setStatus("ok", `✓ Connected — ${streetNames.length} streets loaded`);

    // Zoom to layer extent
    try {
      const e = info.extent;
      if (e) map.fitBounds([[e.ymin, e.xmin],[e.ymax, e.xmax]]);
    } catch(_) {}

  } catch(e) {
    setStatus("err", `Connection failed: ${e.message}`);
    document.getElementById("btnConnect").disabled = false;
  }
}

async function loadStreetNames() {
  const url = `${layerUrl}/query?where=FullName+IS+NOT+NULL&outFields=FullName,FROM_CROSS,TO_CROSS&returnDistinctValues=false&resultRecordCount=10000&f=geojson`;
  const data = await fetchJSON(url);

  const nameSet = new Set(), crossSet = new Set();
  (data.features || []).forEach(f => {
    const p = f.properties || {};
    if (p.FullName)   nameSet.add(p.FullName.trim());
    if (p.FROM_CROSS) p.FROM_CROSS.split(",").forEach(s => { if(s.trim()) crossSet.add(s.trim()); });
    if (p.TO_CROSS)   p.TO_CROSS.split(",").forEach(s => { if(s.trim()) crossSet.add(s.trim()); });
  });

  streetNames = [...nameSet].sort();
  crossNames  = [...crossSet].sort();
}

// ─── PREVIEW ─────────────────────────────────────────────────────
async function previewSegment() {
  const street = gv("streetInput"), from = gv("fromInput"), to = gv("toInput");
  if (!street)       { setStatus("err","Enter a street name"); return; }
  if (!from && !to)  { setStatus("err","Enter at least one cross street"); return; }
  if (!layerUrl)     { setStatus("err","Connect a layer first"); return; }

  setStatus("loading","Querying...");
  previewGroup.clearLayers();
  lastPreview = null;
  document.getElementById("btnAdd").disabled = true;

  try {
    const result = await querySegments(street, from, to);
    if (!result || result.features.length === 0) {
      setStatus("err","No segments found — check spelling"); return;
    }

    const { features, minAddr, maxAddr } = result;
    const bounds = [];

    features.forEach(f => {
      const coords = extractCoords(f);
      if (!coords) return;
      const latlngs = coords.map(c => [c[1], c[0]]);
      L.polyline(latlngs, { color: "#f5c842", weight: 6, opacity: 1 }).addTo(previewGroup);
      latlngs.forEach(ll => bounds.push(ll));
    });

    if (bounds.length) map.fitBounds(bounds, { padding: [60, 60] });

    lastPreview = { features, street, from, to, minAddr, maxAddr };
    document.getElementById("btnAdd").disabled = false;
    setStatus("ok", `✓ ${features.length} segment${features.length > 1 ? "s" : ""} — click + Add to keep`);

  } catch(e) {
    setStatus("err", `Query error: ${e.message}`);
    console.error(e);
  }
}

// ─── ADD TO COLLECTION ───────────────────────────────────────────
function addToCollection() {
  if (!lastPreview) return;
  const { features, street, from, to, minAddr, maxAddr } = lastPreview;
  const id    = ++colIdSeq;
  const color = COLORS[(id - 1) % COLORS.length];

  features.forEach(f => {
    const coords = extractCoords(f);
    if (!coords) return;
    L.polyline(coords.map(c => [c[1],c[0]]), { color, weight: 6, opacity: 1 }).addTo(collectionGroup);
  });

  previewGroup.clearLayers();
  lastPreview = null;
  document.getElementById("btnAdd").disabled = true;

  collection.push({ id, street, from, to, minAddr, maxAddr, features, color });
  renderList();
  setStatus("ok", `✓ Added — ${collection.length} entr${collection.length > 1 ? "ies" : "y"} in collection`);

  document.getElementById("streetInput").value = "";
  document.getElementById("fromInput").value   = "";
  document.getElementById("toInput").value     = "";
}

// ─── REMOVE ──────────────────────────────────────────────────────
window.removeEntry = function(id) {
  collection = collection.filter(c => c.id !== id);
  collectionGroup.clearLayers();
  collection.forEach(entry => {
    entry.features.forEach(f => {
      const coords = extractCoords(f);
      if (!coords) return;
      L.polyline(coords.map(c => [c[1],c[0]]), { color: entry.color, weight: 6 }).addTo(collectionGroup);
    });
  });
  renderList();
  setStatus("idle", `${collection.length} entr${collection.length !== 1 ? "ies" : "y"} remaining`);
};

function renderList() {
  const list  = document.getElementById("colList");
  const count = document.getElementById("colCount");
  const btn   = document.getElementById("btnExport");
  const meta  = document.getElementById("exportMeta");

  count.textContent = collection.length;
  btn.disabled = collection.length === 0;

  if (collection.length === 0) {
    list.innerHTML = `<div class="empty">No segments yet.<br>Preview then click + Add.</div>`;
    meta.textContent = "Add segments to export";
    return;
  }

  const total = collection.reduce((n,c) => n + c.features.length, 0);
  meta.textContent = `${collection.length} entries · ${total} segments`;

  list.innerHTML = collection.map(e => `
    <div class="col-item">
      <div class="ci-dot" style="background:${e.color}"></div>
      <div class="ci-info">
        <div class="ci-street">${e.street}</div>
        <div class="ci-cross">${e.from||"—"} → ${e.to||"—"}</div>
      </div>
      <div class="ci-segs">${e.features.length}seg</div>
      <button class="btn-rm" onclick="removeEntry(${e.id})">×</button>
    </div>
  `).join("");
}

// ─── EXPORT GEOJSON ──────────────────────────────────────────────
function exportGeoJSON() {
  if (collection.length === 0) return;

  const features = [];

  collection.forEach(entry => {
    entry.features.forEach(f => {
      const coords = extractCoords(f);
      if (!coords || coords.length < 2) return;

      const raw = f.properties || {};
      const props = {};
      Object.entries(raw).forEach(([k, val]) => {
        if (val === null || val === undefined) return;
        if (k === "Shape__Length" || k === "Shape.STLength()") return;
        props[k] = val;
      });
      props.StreetName = entry.street;
      props.FromCross  = entry.from  || "";
      props.ToCross    = entry.to    || "";
      props.AddrFrom   = entry.minAddr;
      props.AddrTo     = entry.maxAddr;

      features.push({
        type: "Feature",
        properties: props,
        geometry: { type: "LineString", coordinates: coords }
      });
    });
  });

  const geojson = { type: "FeatureCollection", features };
  const blob = new Blob([JSON.stringify(geojson, null, 2)], { type: "application/geo+json" });
  const a = Object.assign(document.createElement("a"), {
    href: URL.createObjectURL(blob),
    download: "lynwood_segments.geojson"
  });
  a.click();
  URL.revokeObjectURL(a.href);
  setStatus("ok", `✓ Exported ${features.length} segments`);
}

// ─── QUERY ───────────────────────────────────────────────────────
async function querySegments(street, from, to) {

  // Step 1: find the FROM boundary segment (touches 'from' cross street)
  // Step 2: find the TO boundary segment (touches 'to' cross street)
  // Then grab everything BETWEEN them using their address values

  async function getBoundarySegs(crossStreet) {
    const w = `FullName = '${esc(street)}' AND (FROM_CROSS LIKE '%${esc(crossStreet)}%' OR TO_CROSS LIKE '%${esc(crossStreet)}%')`;
    const r = await fetchJSON(`${layerUrl}/query?where=${encodeURIComponent(w)}&outFields=From_L,To_L&returnGeometry=false&f=geojson`);
    return r.features || [];
  }

  let minAddr = null, maxAddr = null;

  if (from && to) {
    // Both boundaries specified — find each independently
    const fromSegs = await getBoundarySegs(from);
    const toSegs   = await getBoundarySegs(to);

    if (!fromSegs.length || !toSegs.length) return { features: [], minAddr: null, maxAddr: null };

    // Use the full address extent of each boundary segment
    const fromAddrs = fromSegs.flatMap(f => [f.properties?.From_L, f.properties?.To_L]).filter(v => v != null);
    const toAddrs   = toSegs.flatMap(f => [f.properties?.From_L, f.properties?.To_L]).filter(v => v != null);

    // The block range spans from the lowest addr of the from-boundary
    // to the highest addr of the to-boundary
    const fromMin = Math.min(...fromAddrs);
    const fromMax = Math.max(...fromAddrs);
    const toMin   = Math.min(...toAddrs);
    const toMax   = Math.max(...toAddrs);

    // Determine direction: which boundary has lower address numbers
    if (fromMin <= toMin) {
      minAddr = fromMin;
      maxAddr = toMax;
    } else {
      minAddr = toMin;
      maxAddr = fromMax;
    }

  } else {
    // Only one boundary — fall back to single-side query
    const crossStreet = from || to;
    const segs = await getBoundarySegs(crossStreet);
    if (!segs.length) return { features: [], minAddr: null, maxAddr: null };
    const addrs = segs.flatMap(f => [f.properties?.From_L, f.properties?.To_L]).filter(v => v != null);
    minAddr = Math.min(...addrs);
    maxAddr = Math.max(...addrs);
  }

  if (minAddr === null || maxAddr === null) return { features: [], minAddr: null, maxAddr: null };

  // Step 3: get all segments strictly within the address range
  // Use >= minAddr AND <= maxAddr so boundary segs are included but nothing outside
  const w2 = `FullName = '${esc(street)}' AND From_L >= ${minAddr} AND To_L <= ${maxAddr}`;
  const r2  = await fetchJSON(`${layerUrl}/query?where=${encodeURIComponent(w2)}&outFields=FullName,FROM_CROSS,TO_CROSS,From_L,To_L,OBJECTID&returnGeometry=true&f=geojson`);

  return { features: r2.features || [], minAddr, maxAddr };
}

// ─── HELPERS ─────────────────────────────────────────────────────
function extractCoords(feature) {
  try {
    const geom = feature.geometry;
    if (!geom) return null;
    if (geom.type === "LineString") {
      return geom.coordinates.filter(c => Array.isArray(c) && c.length >= 2).map(c => [c[0], c[1]]);
    }
    if (geom.type === "MultiLineString") {
      const all = [];
      geom.coordinates.forEach(ring => ring.forEach(c => { if (c.length >= 2) all.push([c[0],c[1]]); }));
      return all.length >= 2 ? all : null;
    }
  } catch(e) { return null; }
  return null;
}

async function fetchJSON(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

function esc(s) { return String(s).replace(/'/g, "''"); }
function gv(id) { return document.getElementById(id).value.trim(); }

function clearSearch() {
  previewGroup.clearLayers();
  lastPreview = null;
  ["streetInput","fromInput","toInput"].forEach(id => document.getElementById(id).value = "");
  document.getElementById("btnAdd").disabled = true;
  setStatus("idle","○ Cleared");
}

// ─── AUTOCOMPLETE ────────────────────────────────────────────────
window.doAC = function(input, listId, items) {
  const v = input.value.toLowerCase();
  const list = document.getElementById(listId);
  if (v.length < 2) { list.classList.remove("open"); return; }
  const matches = items.filter(i => i.toLowerCase().includes(v)).slice(0, 8);
  if (!matches.length) { list.classList.remove("open"); return; }
  list.innerHTML = matches.map(m =>
    `<div class="ac-item" onmousedown="pickAC('${input.id}','${listId}','${m.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">${m}</div>`
  ).join("");
  list.classList.add("open");
};

window.pickAC = function(inputId, listId, val) {
  document.getElementById(inputId).value = val;
  document.getElementById(listId).classList.remove("open");
};

document.addEventListener("click", e => {
  ["streetAC","fromAC","toAC"].forEach(id => {
    const el = document.getElementById(id);
    if (el && !el.closest(".ac-wrap").contains(e.target)) el.classList.remove("open");
  });
});

function setStatus(type, msg) {
  const el = document.getElementById("statusMsg");
  el.className = { loading:"s-loading", ok:"s-ok", err:"s-err", idle:"s-idle" }[type] || "s-idle";
  el.textContent = msg;
}
</script>
